{% extends "base.html" %}

{% block title %}{{ thread[1] }}{% endblock %}

{% block content %}
<h1>{{ thread[1] }}</h1>

<div class="card">
    <a href="/forum" class="button-link">Tilbage til forum</a>
</div>

{% for p in posts %}
    <div class="card forum-post">
        <div class="forum-post-meta">
            <strong>{{ p[1] }}</strong>
            <span class="muted">{{ p[3] }}</span>
        </div>
        <div class="forum-post-body">{{ p[2] }}</div>
    </div>
{% endfor %}

<div class="card">
    <h2>Svar</h2>

    <form method="post" action="/forum/{{ thread[0] }}/reply">
        <div class="field">
            <label for="body">Svar</label>
            <textarea id="body" name="body" rows="5" required></textarea>
        </div>

        <button type="submit">Send svar</button>
    </form>
</div>
{% endblock %}
