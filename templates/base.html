<!doctype html>
<html lang="da">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Golf Liga{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% block page_shell %}
    <div class="container">
        <header class="topbar">
            <a href="/" class="brand">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="MuchBetter Golf">
            </a>

            <form class="top-search" action="/stats" method="get">
                <input type="search" name="q" placeholder="Søg spiller, runde..." aria-label="Søg">
            </form>


            <nav class="topnav">
                <a href="/rounds" class="{% if '/rounds' in request.path %}active{% endif %}">
                    <span class="nav-icon">☰</span>
                    <span>Runder</span>
                </a>


                <a href="/me" class="{% if request.path == '/me' %}active{% endif %}">
                    <span class="nav-icon">👤</span>
                    <span>Min side</span>
                </a>


                <a href="/stats" class="{% if '/stats' in request.path %}active{% endif %}">
                    <span class="nav-icon">↗</span>
                    <span>Statistik</span>
                </a>

                <a href="/forum" class="{% if '/forum' in request.path %}active{% endif %}">
                    <span class="nav-icon">💬</span>
                    <span>Forum</span>
                </a>

                {% if session.logged_in %}
                    <span style="font-size:12px;">{{ session.user_id }}</span>
                {% endif %}

                {% if session.logged_in %}
                    <a href="/logout">
                        <span class="nav-icon">⌂</span>
                        <span>Log ud</span>
                    </a>
                {% else %}
                    <a href="/login">
                        <span class="nav-icon">⌂</span>
                        <span>Log ind</span>
                    </a>
                {% endif %}
            </nav>
        </header>

        {% block content %}{% endblock %}
    </div>
    {% endblock %}
</body>
</html>
